<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="robots" content="noindex"/>
<title>Page Not Found — Ramba Health Initiative</title>
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Plus+Jakarta+Sans:wght@400;600&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Plus Jakarta Sans',sans-serif;background:#f1f5f9;color:#0f1d2e;display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:24px}
  .wrap{max-width:480px}
  .code{font-family:'Playfair Display',serif;font-size:120px;font-weight:700;color:#0a7490;line-height:1}
  h1{font-family:'Playfair Display',serif;font-size:28px;margin:16px 0 12px;color:#0c2d48}
  p{font-size:16px;color:#607d8b;margin-bottom:32px;line-height:1.7}
  a{display:inline-block;background:#0a7490;color:#fff;padding:12px 28px;border-radius:8px;font-weight:700;font-size:14px;text-decoration:none;transition:background .2s}
  a:hover{background:#075f77}
</style>
</head>
<body>
<div class="wrap">
  <div class="code">404</div>
  <h1>Page Not Found</h1>
  <p>The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
  <a href="/">Go to Homepage</a>
</div>
</body>
</html>
